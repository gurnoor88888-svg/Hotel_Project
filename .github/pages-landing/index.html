<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Project</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.35) 0%, transparent 45%),
        radial-gradient(circle at 85% 15%, rgba(168, 85, 247, 0.3) 0%, transparent 45%),
        radial-gradient(circle at 50% 90%, rgba(56, 189, 248, 0.18) 0%, transparent 50%),
        #0b1120;
      color: #f1f5f9;
    }
    .card {
      max-width: 460px;
      width: 90%;
      text-align: center;
      padding: 3rem 2.5rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .badge {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      box-shadow: 0 10px 26px rgba(99, 102, 241, 0.45);
    }
    h1 {
      font-size: 1.85rem;
      margin: 0 0 0.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f1f5f9, #c7d2fe);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p {
      color: #94a3b8;
      margin: 0 0 2rem;
      font-size: 0.95rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    a.link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.95rem 1.25rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    a.link.secondary {
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    a.link:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(79, 70, 229, 0.4);
    }
    a.link.secondary:hover {
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
      border-color: rgba(148, 163, 184, 0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🏨</div>
    <h1>Hotel Project</h1>
    <p>Sign up or log in to continue.</p>
    <div class="links">
      <a class="link" href="./user/signup">🧳 User Sign Up</a>
      <a class="link secondary" href="./admin/">🛡️ Admin Login</a>
    </div>
  </div>
</body>
</html>
