<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Project</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    .card {
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    a.link {
      display: block;
      padding: 0.9rem 1.25rem;
      border-radius: 10px;
      background: #1e293b;
      color: #f1f5f9;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #334155;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    a.link:hover {
      background: #334155;
      border-color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hotel Project</h1>
    <p>Choose which app you want to open.</p>
    <div class="links">
      <a class="link" href="./user/">User App</a>
      <a class="link" href="./owner/">Owner App</a>
      <a class="link" href="./admin/">Admin App</a>
    </div>
  </div>
</body>
</html>
