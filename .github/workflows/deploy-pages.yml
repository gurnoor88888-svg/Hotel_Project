name: Deploy frontends to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Set this repo variable (Settings -> Secrets and variables -> Actions -> Variables)
      # to your Render backend URL once it's deployed, e.g. https://hotel-project-backend.onrender.com
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build User-Frontend
        working-directory: User-Frontend
        env:
          VITE_BASE_PATH: /Hotel_Project/user/
        run: |
          npm ci
          npm run build

      - name: Build Owner-Frontend
        working-directory: Owner-Frontend
        env:
          VITE_BASE_PATH: /Hotel_Project/owner/
        run: |
          npm ci
          npm run build

      - name: Build Admin-Frontend
        working-directory: Admin-Frontend
        env:
          VITE_BASE_PATH: /Hotel_Project/admin/
        run: |
          npm ci
          npm run build

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r User-Frontend/dist site/user
          cp -r Owner-Frontend/dist site/owner
          cp -r Admin-Frontend/dist site/admin
          cp .github/pages-landing/index.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
